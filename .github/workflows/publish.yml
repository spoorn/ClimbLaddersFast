name: Publish Mods

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version_type:
        description: Release channel for CurseForge and Modrinth
        required: true
        default: release
        type: choice
        options:
          - release
          - beta
          - alpha
      changelog:
        description: Changelog text for manual publishes
        required: false
        type: string

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Read project properties
        id: props
        shell: bash
        run: |
          mod_version="$(awk -F= '/^mod_version=/{print $2}' gradle.properties)"
          minecraft_version="$(awk -F= '/^minecraft_version=/{print $2}' gradle.properties)"

          echo "mod_version=${mod_version}" >> "${GITHUB_OUTPUT}"
          echo "minecraft_version=${minecraft_version}" >> "${GITHUB_OUTPUT}"

      - name: Build release jars
        run: ./gradlew build --no-daemon --warning-mode all

      - name: Publish Fabric
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          curseforge-id: 459522
          curseforge-token: ${{ secrets.CURSEFORGE_TOKEN }}
#          modrinth-id: ${{ vars.MODRINTH_PROJECT_ID || secrets.MODRINTH_PROJECT_ID }}
#          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}

          files: fabric/build/libs/climbladdersfast-${{ steps.props.outputs.mod_version }}-fabric.jar
          name: ClimbLaddersFast ${{ steps.props.outputs.mod_version }} Fabric
          version: ${{ steps.props.outputs.mod_version }}-fabric
          version-type: ${{ inputs.version_type || (github.event.release.prerelease && 'beta' || 'release') }}
          changelog: ${{ github.event.release.body || inputs.changelog || 'See the GitHub release for details.' }}

          loaders: fabric
          game-versions: ${{ steps.props.outputs.minecraft_version }}
          game-version-filter: none
          java: 25

          dependencies: |
            fabric-api(required){curseforge:306612}{modrinth:P7dR8mSH}
            cloth-config(required){curseforge:348521}{modrinth:9s6osm5g}
            modmenu(optional){curseforge:308702}{modrinth:mOgUt4GM}

      - name: Publish NeoForge
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          curseforge-id: ${{ vars.CURSEFORGE_PROJECT_ID || secrets.CURSEFORGE_PROJECT_ID }}
          curseforge-token: ${{ secrets.CURSEFORGE_TOKEN }}
          modrinth-id: ${{ vars.MODRINTH_PROJECT_ID || secrets.MODRINTH_PROJECT_ID }}
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}

          files: neoforge/build/libs/climbladdersfast-${{ steps.props.outputs.mod_version }}-neoforge.jar
          name: ClimbLaddersFast ${{ steps.props.outputs.mod_version }} NeoForge
          version: ${{ steps.props.outputs.mod_version }}-neoforge
          version-type: ${{ inputs.version_type || (github.event.release.prerelease && 'beta' || 'release') }}
          changelog: ${{ github.event.release.body || inputs.changelog || 'See the GitHub release for details.' }}

          loaders: neoforge
          game-versions: ${{ steps.props.outputs.minecraft_version }}
          game-version-filter: none
          java: 25

          dependencies: |
            cloth-config(required){curseforge:348521}{modrinth:9s6osm5g}
